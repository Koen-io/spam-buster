<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Spam Buster — Splash</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:#f4f7fb}
  body{display:flex;align-items:center;justify-content:center;font-family:-apple-system,BlinkMacSystemFont,'Space Grotesk',sans-serif}
  .splash{position:relative;width:760px;height:500px;max-width:100vw;background:linear-gradient(180deg,#ffffff 0%,#f4f7fb 100%);overflow:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer}
  .halo{position:absolute;top:86px;width:230px;height:230px;border-radius:50%;background:radial-gradient(circle,rgba(59,130,246,.12),transparent 70%);animation:glow 3.6s ease-in-out infinite}
  .icon{width:150px;height:150px;border-radius:34px;margin-bottom:34px;background:linear-gradient(160deg,#5ea0ff 0%,#2f74e6 52%,#1b56c4 100%);box-shadow:0 22px 40px -12px rgba(30,90,200,.5),inset 0 1px 0 rgba(255,255,255,.5);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;animation:pop .8s .1s cubic-bezier(.2,.9,.3,1.2) both}
  .gloss{position:absolute;top:-44px;left:-18px;width:190px;height:140px;background:rgba(255,255,255,.28);border-radius:50%;filter:blur(3px)}
  .name{font-weight:600;font-size:38px;letter-spacing:-.02em;color:#141b26;opacity:0;animation:up .6s .85s ease-out forwards}
  .tag{font-size:15px;color:#6b7a8d;margin-top:10px;opacity:0;animation:up .6s 1.1s ease-out forwards}
  .loader{position:absolute;bottom:46px;display:flex;flex-direction:column;align-items:center;gap:13px;opacity:0;animation:fade .5s 1.4s ease-out forwards}
  .track{width:240px;height:5px;border-radius:5px;background:#e6ebf2;overflow:hidden}
  .fill{height:100%;border-radius:5px;background:linear-gradient(90deg,#5ea0ff,#2f74e6);transform-origin:left;animation:bar 1.9s 1.5s cubic-bezier(.5,0,.1,1) forwards}
  .status{font-size:12px;color:#8a97a8}
  @keyframes pop{0%{opacity:0;transform:scale(.6)}70%{transform:scale(1.08)}100%{opacity:1;transform:scale(1)}}
  @keyframes up{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  @keyframes bar{from{transform:scaleX(0)}to{transform:scaleX(1)}}
  @keyframes glow{0%,100%{opacity:.5}50%{opacity:1}}
</style>
</head>
<body>
<div class="splash" id="splash" title="Click to replay">
  <div class="halo"></div>
  <div class="icon">
    <div class="gloss"></div>
    <svg viewBox="0 0 100 120" width="74" height="89" fill="none" style="position:relative;filter:drop-shadow(0 4px 6px rgba(10,40,90,.35))">
      <path d="M50 6 L90 21 L90 59 C90 90 70 109 50 115 C30 109 10 90 10 59 L10 21 Z" fill="#ffffff"/>
      <rect x="31" y="50" width="38" height="26" rx="4" fill="none" stroke="#2f74e6" stroke-width="3.4"/>
      <path d="M33 53 L50 65 L67 53" stroke="#2f74e6" stroke-width="3.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>
  <div class="name">Spam Buster</div>
  <div class="tag">The frontline defense against digital noise</div>
  <div class="loader">
    <div class="track"><div class="fill"></div></div>
    <div class="status">Preparing your inbox…</div>
  </div>
</div>
<script>
  document.getElementById('splash').addEventListener('click', function(){
    const c = this.cloneNode(true);
    this.parentNode.replaceChild(c, this);
    c.addEventListener('click', arguments.callee);
  });
</script>
</body>
</html>
